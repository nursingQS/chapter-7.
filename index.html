<script>
    // Chapter 7: Disability and Chronic Illness – 37 questions
    const questions = [
        {
            id: 1,
            question: "1. A client who uses a wheelchair was unable to enter a health care clinic because the pavement was too high. The client filed a formal complaint stating that reasonable accommodations were not met. What is an example of a reasonable accommodation under the 1990 American Disabilities Act (ADA)?",
            options: [
                "A. Priority medical appointments and grab bars",
                "B. Low-cost transportation and elevated toilet seats",
                "C. Accessible facilities and equipment",
                "D. Alternate communication methods and medical home visits"
            ],
            correct: 2, // C
            rationale: "Correct. In health care facilities, reasonable accommodation included accessible facilities and equipment. The ADA of 1990 did not include priority medical appointments or low-cost transportation. Grab bars and elevated toilet seats fall under accessible equipment. Alternative communication methods also fall under the ADA of 1990, but medical home visits do not. (PTS:1 REF:p.146)"
        },
        {
            id: 2,
            question: "2. A client tells the nurse that the doctor just told the client that a new diagnosis of rheumatoid arthritis is considered to be a \"chronic condition.\" The client asks the nurse what \"chronic condition\" means. What would be the nurse's best response?",
            options: [
                "A. \"It is a health problem that require managements of several months or longer.\"",
                "B. \"Chronic conditions are disabilities that require medical treatments that limit activity.\"",
                "C. \"Medical conditions are chronic when they culminate in disabilities that require hospitalization.\"",
                "D. \"Chronic conditions are conditions that require short-term management in extended-care facilities.\""
            ],
            correct: 0, // A
            rationale: "Correct. Chronic conditions are often defined as medical conditions or health problems with associated symptoms or disabilities that require long-term management (3 months or longer). A chronic disease is not defined as a disability, nor does it always require hospitalization. And chronic diseases do not always limit activity. (PTS:1 REF:p.155)"
        },
        {
            id: 3,
            question: "3. A medical–surgical nurse is teaching a client about the health implications of the client's recently diagnosed type 2 diabetes. The nurse should teach the client to be proactive with glycemic control to reduce the risk of what health problem?",
            options: [
                "A. Urinary tract infections",
                "B. Renal failure",
                "C. Pneumonia",
                "D. Inflammatory bowel disease"
            ],
            correct: 1, // B
            rationale: "Correct. One chronic disease can lead to the development of other chronic conditions. Diabetes, for example, can eventually lead to neurologic and vascular changes that may result in visual, cardiac, and kidney disease and erectile dysfunction. Diabetes is not directly linked to urinary tract infections, pneumonia, or inflammatory bowel disease. (PTS:1 REF:p.159)"
        },
        {
            id: 4,
            question: "4. An international nurse has noted that a trend in emerging countries is a decrease in mortality from some acute conditions. What has contributed to this decrease in mortality from some acute conditions?",
            options: [
                "A. Improved nutrition",
                "B. Integration of alternative health practices",
                "C. Stronger international security measures",
                "D. Decreases in obesity"
            ],
            correct: 0, // A
            rationale: "Correct. In emerging countries, chronic conditions have seen a decrease in mortality due to improved nutrition, immunizations, and prompt and aggressive management of acute conditions. The integration of alternative health practices has not contributed to a decrease in mortality. Stronger international security measures have not contributed to a decrease in mortality. Obesity has not decreased, even in emerging countries. (PTS:1 REF:p.159)"
        },
        {
            id: 5,
            question: "5. A 37-year-old client with multiple sclerosis is married and has three children. The nurse has worked extensively with the client and family to plan appropriate care. What is the nurse's most important role with this client?",
            options: [
                "A. Ensure the client adheres to all treatments.",
                "B. Provide the client with advice on alternative treatment options.",
                "C. Provide a detailed plan of activities of daily living (ADLs) for the client.",
                "D. Help the client develop strategies to implement treatment regimens."
            ],
            correct: 3, // D
            rationale: "Correct. The most important role of the nurse working with clients with chronic illness is to help clients develop the strategies needed to implement their treatment regimens and carry out activities of daily living. The nurse cannot ensure the client adheres to all treatments. Providing the client with advice on alternate treatments is a specific option in the broader statement of developing strategies. The nurse does not provide the client with a detailed plan of ADLs, though promotion of ADLs is a priority. (PTS:1 REF:p.145)"
        },
        {
            id: 6,
            question: "6. A client has recently been diagnosed with type 2 diabetes. The client is clinically obese and has a sedentary lifestyle. How can the nurse best begin to help the client increase their activity level?",
            options: [
                "A. Set up appointment times at a local fitness center for the client to attend.",
                "B. Have a family member ensure the client follows a suggested exercise plan.",
                "C. Construct an exercise program and have the client follow it.",
                "D. Identify barriers with the client that inhibit lifestyle changes."
            ],
            correct: 3, // D
            rationale: "Correct. Identifying barriers that inhibit a lifestyle change will increase the likelihood that these changes will become permanent. Nurses and family members can support and encourage a client to increase their activity but only the client can actually ensure that it occurs. The client may not be ready or willing to accept this lifestyle change. (PTS:1 REF:p.161)"
        },
        {
            id: 7,
            question: "7. A home care nurse is making an initial visit to a 68-year-old client. The nurse finds the client tearful and emotionally withdrawn. Even though the client lives alone and has no family, the client has been managing well at home until now. What would be the most appropriate action for the nurse to take?",
            options: [
                "A. Reassess the client's psychosocial status and make the necessary referrals.",
                "B. Have the client volunteer in the community for social contact.",
                "C. Arrange for the client to be reassessed by a social worker.",
                "D. Encourage the client to focus on the positive aspects of life."
            ],
            correct: 0, // A
            rationale: "Correct. The client is exhibiting signs of depression and should be reassessed and a referral made as necessary. Clients with chronic illness are at an increased risk of depression. It would be simplistic to arrange for the client to volunteer or focus on the positive. Social work may or may not be needed; assessment should precede such a referral. (PTS:1 REF:p.145)"
        },
        {
            id: 8,
            question: "8. The nurse is caring for a male client with a history of chronic angina. The client states that after breakfast he usually takes a shower and shaves. It is at this time, the client says, that he tends to experience chest pain. What should the nurse counsel the client to do to decrease the likelihood of angina in the morning?",
            options: [
                "A. Shower in the evening and shave before breakfast.",
                "B. Skip breakfast and eat an early lunch.",
                "C. Take a nitroglycerin tab prior to breakfast.",
                "D. Shower once a week and shave prior to breakfast."
            ],
            correct: 0, // A
            rationale: "Correct. If the nurse determines that one of the situations most likely to precipitate angina is to shower and shave after breakfast, the nurse might counsel the client to break these activities into different times during the day. Skipping breakfast and eating an early lunch would not decrease the likelihood of angina in the morning. Taking a nitroglycerin tablet before breakfast is inappropriate because the event requiring the medication has not yet occurred. Also, suggesting that the client shower once a week and shave prior to breakfast is an incorrect suggestion because showering and shaving can both be done every day if they are spread out over the course of the day. (PTS:1 REF:p.160)"
        },
        {
            id: 9,
            question: "9. A client uses a wheelchair. The client wants to attend a church-sponsored support group for parents of children diagnosed with autism spectrum disorder. The client arrives at the church and realizes there are no ramps or elevators to the basement. What type of barrier did this client encounter?",
            options: [
                "A. A structural barrier",
                "B. A barrier to health care",
                "C. An institutional barrier",
                "D. A transportation barrier"
            ],
            correct: 0, // A
            rationale: "Correct. Structural barriers make certain facilities inaccessible. Examples of structural barriers include stairs, lack of ramps, narrow doorways that do not permit entry of a wheelchair, and restroom facilities that cannot be used by people with physical impairments. Institutional barriers are policies, guidelines, or procedures that place certain groups of people at a disadvantage. Transportation barriers are any physical objects that hinder the flow of people moving from one location to another. And health care barriers are described as anything that limits and/or restricts the use of health services. (PTS:1 REF:p.149)"
        },
        {
            id: 10,
            question: "10. A client who is legally blind is being admitted to the hospital. The client informs the nurse that they need to have their guide dog present during hospitalization. What is the nurse's best response to the client?",
            options: [
                "A. \"Arrangements can be made for your guide dog to be at the hospital with you during your stay.\"",
                "B. \"I will need to check with the care team before that decision can be made.\"",
                "C. \"Because of infection control, your guide dog will likely not be allowed to stay in your room during your hospitalization.\"",
                "D. \"Your guide dog can stay with you during your hospitalization, but it will need to stay in a cage or crate that you will need to provide.\""
            ],
            correct: 0, // A
            rationale: "Correct. If clients usually use service animals to assist them with ADLs, it is necessary to make arrangements for the accommodation of these animals. The client should be moved to a private room, and a cage would prevent the service dog from freely assisting the client, so it is not necessary. (PTS:1 REF:p.152)"
        },
        {
            id: 11,
            question: "11. A nurse is taking an Advanced Cardiovascular Life Support class. The nurse has dyslexia and is given an extra hour to complete the exam. What type of disability best defines the nurse's condition?",
            options: [
                "A. Intellectual disability",
                "B. Sensory disability",
                "C. Psychiatric disability",
                "D. Cognitive disability"
            ],
            correct: 1, // B
            rationale: "Correct. A sensory disability is an impairment of sight, hearing, smell, and touch. It also includes learning disabilities such as dyslexia. Intellectual disability occurs before the age of 18 and is characterized by significant limitations in both intellectual functioning and adaptive behavior. Psychiatric disability is defined as mental illness that substantially limits a client's ability to complete major life activities. Cognitive disability is a limitation in mental functioning and difficulties with communication, self-care, and social skills. (PTS:1 REF:p.143)"
        },
        {
            id: 12,
            question: "12. A 19-year-old client with a diagnosis of Down syndrome is being admitted to the unit for the treatment of community-acquired pneumonia. When planning this client's care, the nurse recognizes that this client's disability is categorized as what type?",
            options: [
                "A. A sensory disability",
                "B. A developmental disability",
                "C. An acquired disability",
                "D. An age-associated disability"
            ],
            correct: 1, // B
            rationale: "Correct. Developmental disabilities are those that occur any time from birth to 22 years of age and result in impairment of physical or mental health, cognition, speech, language, or self-care. Examples of developmental disabilities are spina bifida, cerebral palsy, Down syndrome, and muscular dystrophy. Acquired disabilities may occur as a result of an acute and sudden injury, acute nontraumatic disorders, or progression of a chronic disorder. Age-related disabilities are those that occur in an older adult population and are thought to be due to the aging process. A sensory disability is a type of a disability and not a category. (PTS:1 REF:p.142)"
        },
        {
            id: 13,
            question: "13. The nurse is reviewing the importance of preventive health care with a client who has a disability. The client describes intense financial pressures associated with being disabled. What is the nurse's best response?",
            options: [
                "A. \"Limited finances are a common problem for clients with a disability.\"",
                "B. \"Is there anyone who you might be able to borrow money from in the short term?\"",
                "C. \"I'll look into federal assistance programs that provide financial assistance for health-related expenses for people with disabling conditions.\"",
                "D. \"Many of your expenses should be tax deductible, so you should consult with your accountant and then make your appointments.\""
            ],
            correct: 2, // C
            rationale: "Correct. Several federal assistance programs provide financial assistance for health-related expenses for people with some chronic illnesses, acquired disabling acute and chronic diseases, and diseases from childhood. Lack of financial resources, including health insurance, is an important barrier to health care for people with disabilities. Acknowledging the problem without proposing solutions is insufficient. The nurse does not know the tax implications of the client's circumstances and should not encourage borrowing as an initial approach. (PTS:1 REF:p.150)"
        },
        {
            id: 14,
            question: "14. As a case manager, the nurse oversees the multidisciplinary care of several clients living with chronic conditions. Two of the nurse's clients are living with spina bifida. The center of care for these two clients will typically exist where?",
            options: [
                "A. In the hospital",
                "B. In the health care provider's office",
                "C. In the home",
                "D. In the rehabilitation facility"
            ],
            correct: 2, // C
            rationale: "Correct. The day-to-day management of illness is largely the responsibility of people with chronic disorders and their families. As a result, the home, rather than the hospital, is the center of care in chronic conditions. Hospitals, rehabilitation facilities, clinics, health care provider's offices, nursing homes, nursing centers, and community agencies are considered adjuncts or backup services to daily home management. (PTS:1 REF:p.160)"
        },
        {
            id: 15,
            question: "15. A nurse is planning the care of a client who has been diagnosed with asthma, which the nurse recognizes as being a chronic condition. Which of the following descriptors apply to chronic conditions? Select all that apply.",
            options: [
                "A. Resolve slowly",
                "B. Rarely are completely cured",
                "C. Have a short, unpredictable course",
                "D. Do not resolve spontaneously",
                "E. Have a prolonged course"
            ],
            correct: [1, 3, 4], // B, D, E
            rationale: "Correct. Chronic conditions can also be defined as illnesses or diseases that have a prolonged course, do not resolve spontaneously, and are rarely completely cured. They do not typically resolve, whether slowly or otherwise, and have a long, predictable course. (PTS:1 REF:p.159)"
        },

    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[q.id - 1];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'Finish ➡️' : 'Next ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[q.id - 1];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[q.id - 1] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT! Well done.';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. The correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[q.id - 1] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            const q = questions[currentQuestion];
            selectedOption = answers[q.id - 1];
            loadQuestion();
        }
    }

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
